<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>🍞 面包猫公主作战面板</title>
<style>
:root{
  --bg:#f9f8f5;--card:#ffffff;--border:#e6e3dd;
  --text:#1a1a1a;--text2:#8c8985;
  --honey:#c0915e;--lav:#8b7ec8;--sage:#6ba387;
  --coral:#d4736a;--cream:#f3eedf;
  --shadow:0 1px 3px rgba(0,0,0,.06)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:600px;margin:0 auto;line-height:1.6;-webkit-tap-highlight-color:transparent}

.head{text-align:center;padding:20px 0 10px}
.head h1{font-size:20px;color:var(--honey)}
.head .day{font-size:13px;color:var(--text2);margin-top:2px}

.anchors{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0 14px}
.atag{font-size:11px;background:var(--cream);color:var(--honey);padding:4px 10px;border-radius:20px}

.cd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;font-size:13px;box-shadow:var(--shadow)}
.cd-item.soon{border-color:var(--honey);background:#fdf8f0}
.cd-item.imm{border-color:var(--coral);background:#fdf2f0}
.cd-item.passed{opacity:.3}
.cd-e{font-size:16px;flex-shrink:0}
.cd-l{flex:1}.cd-n{font-size:11px;color:var(--text2)}
.cd-d{font-weight:700;font-size:14px;white-space:nowrap;min-width:55px;text-align:right}

.daily{background:var(--card);border:1.5px solid var(--sage);border-radius:14px;padding:14px 16px;margin:14px 0;box-shadow:var(--shadow)}
.daily-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.daily-head h2{font-size:15px;flex:1;color:var(--sage)}
.daily-head .hint{font-size:11px;color:var(--text2)}
.dtask{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0eeea}
.dtask:last-of-type{border-bottom:none}
.dchk{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.dchk:active{transform:scale(.88)}
.dchk.on{background:var(--sage);border-color:var(--sage)}
.dchk.on::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.dtask.on .dl{text-decoration:line-through;color:var(--text2)}
.dl{font-size:14px;flex:1}
.ddel{font-size:16px;color:var(--text2);cursor:pointer;padding:0 4px;opacity:.3}
.ddel:active{opacity:1}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-inp{flex:1;background:#f5f3ef;border:1px solid var(--border);border-radius:20px;padding:8px 14px;color:var(--text);font-size:13px;outline:none}
.add-inp:focus{border-color:var(--honey)}
.add-inp::placeholder{color:var(--text2)}
.add-btn{background:var(--sage);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;font-weight:700;cursor:pointer}
.add-btn:active{opacity:.8}
.saving{font-size:11px;color:var(--honey);text-align:center;margin-top:4px;min-height:14px}

.pstrip{display:flex;align-items:center;gap:10px;margin:12px 0}
.pbar-o{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-i{height:100%;background:linear-gradient(90deg,var(--honey),var(--lav));border-radius:3px;transition:width .4s}
.plabel{font-size:13px;font-weight:600;color:var(--honey);min-width:40px;text-align:right}

.active-phase{background:var(--card);border:1.5px solid var(--honey);border-radius:14px;padding:16px;margin:10px 0;box-shadow:var(--shadow)}
.ap-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ap-head .t{font-size:15px;font-weight:600;flex:1}
.ap-head .now{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--cream);color:var(--honey)}
.task{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px}
.chk{flex-shrink:0;width:16px;height:16px;border:2px solid var(--border);border-radius:3px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px}
.task.done .chk{background:var(--sage);border-color:var(--sage)}
.task.done .chk::after{content:"✓";color:#fff;font-weight:700}
.task.done .lbl{text-decoration:line-through;color:var(--text2)}
.task.urg .lbl{color:var(--coral);font-weight:500}
.pmini{font-size:12px;color:var(--text2);margin-bottom:6px}

.dir{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:10px 0;overflow:hidden;box-shadow:var(--shadow)}
.dir-toggle{display:flex;align-items:center;gap:8px;padding:13px 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.dir-toggle:active{background:#f5f3ef}
.dir-toggle .t{font-size:14px;font-weight:600;flex:1;color:var(--honey)}
.dir-toggle .arr{font-size:11px;color:var(--text2);transition:transform .2s}
.dir.open .dir-toggle .arr{transform:rotate(90deg)}
.dir-body{display:none}
.dir.open .dir-body{display:block}

.sec{border-top:1px solid #f0eeea;padding:12px 16px}
.sec-h{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.sec-h:active{opacity:.7}
.sec-h .t{font-size:13px;font-weight:600;flex:1}
.sec-h .sub{font-size:11px;color:var(--text2)}
.sec-h .arr{font-size:10px;color:var(--text2);transition:transform .2s}
.sec.open .sec-h .arr{transform:rotate(90deg)}
.sec-b{display:none;padding-top:8px}
.sec.open .sec-b{display:block}

.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.trow .v{font-weight:600;color:var(--honey)}
.ms{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px}
.ms .dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.ms.done .dot{background:var(--sage)}.ms.done{color:var(--text2);text-decoration:line-through}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sitem{background:#f8f6f2;padding:6px 10px;border-radius:8px;font-size:12px}
.sitem .sl{color:var(--text2);font-size:10px}.sitem .sv{font-weight:600}
.park{padding:6px 10px;background:#f3f0fa;border-left:3px solid var(--lav);border-radius:0 8px 8px 0;margin-bottom:4px;font-size:12px}
.park-empty{font-size:12px;color:var(--text2);font-style:italic}

.footer{text-align:center;padding:16px 0;font-size:11px;color:var(--text2)}
.setup{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:14px 0;text-align:center;box-shadow:var(--shadow)}
.setup p{font-size:12px;color:var(--text2);margin-bottom:10px}
.setup input{width:100%;background:#f5f3ef;border:1px solid var(--border);border-radius:20px;padding:10px 14px;color:var(--text);font-size:13px;margin-bottom:8px;outline:none}
.setup button{background:var(--honey);color:#fff;border:none;border-radius:20px;padding:8px 24px;font-size:14px;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:60px 20px;font-size:16px;color:var(--text2)}
</style>
</head>
<body>
<div id="app" class="loading">🍞 面包烤制中...</div>
<script>
const REPO='mianbaomaogongzhu/-';
const API=`https://api.github.com/repos/${REPO}/contents/data.json`;
let DATA=null,SHA=null,SAVING=false;
function getToken(){return localStorage.getItem('gh_token_bread')}
function setToken(t){localStorage.setItem('gh_token_bread',t)}
function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Tokyo'})}
function todayLabel(){return new Date().toLocaleDateString('zh-CN',{timeZone:'Asia/Tokyo',year:'numeric',month:'long',day:'numeric',weekday:'long'})}
function daysTo(ds){const t=new Date(ds+'T00:00:00+09:00');const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));n.setHours(0,0,0,0);return Math.ceil((t-n)/864e5)}
function isCur(p){const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));n.setHours(0,0,0,0);return n>=new Date(p.start_date+'T00:00:00+09:00')&&n<=new Date(p.end_date+'T23:59:59+09:00')}
async function readData(){const r=await fetch(`https://raw.githubusercontent.com/${REPO}/main/data.json?t=${Date.now()}`);DATA=await r.json();if(getToken()){try{const a=await fetch(API,{headers:{'Authorization':'Bearer '+getToken()}});const aj=await a.json();SHA=aj.sha;}catch(e){}}return DATA;}
async function writeData(msg){if(SAVING||!getToken())return false;SAVING=true;showSaving(true);try{const gr=await fetch(API,{headers:{'Authorization':'Bearer '+getToken()}});const gj=await gr.json();SHA=gj.sha;DATA.meta.last_updated=today();DATA.meta.updated_by='星星';const j=JSON.stringify(DATA,null,2);const b=new TextEncoder().encode(j);let s='';b.forEach(x=>s+=String.fromCharCode(x));const c=btoa(s);const r=await fetch(API,{method:'PUT',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:JSON.stringify({message:msg,content:c,sha:SHA})});SAVING=false;showSaving(false);return r.ok;}catch(e){SAVING=false;showSaving(false);return false;}}
function showSaving(on){const el=document.getElementById('ss');if(el)el.textContent=on?'保存中…':'';}
function resetDaily(){if(!DATA.daily_tasks)DATA.daily_tasks={date:today(),tasks:[]};if(DATA.daily_tasks.date!==today()){DATA.daily_tasks.date=today();DATA.daily_tasks.tasks=DATA.daily_tasks.tasks.filter(t=>t.recurring);DATA.daily_tasks.tasks.forEach(t=>t.done=false);return true;}return false;}
async function toggleDaily(id){const t=DATA.daily_tasks.tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;render(DATA);await writeData(t.done?'✅ '+t.text:'↩️ '+t.text);}
async function addTask(){const inp=document.getElementById('newtask');const txt=inp.value.trim();if(!txt)return;DATA.daily_tasks.tasks.push({id:'dt'+Date.now(),text:txt,done:false,recurring:false});inp.value='';render(DATA);await writeData('➕ '+txt);}
async function delTask(id){DATA.daily_tasks.tasks=DATA.daily_tasks.tasks.filter(t=>t.id!==id);render(DATA);await writeData('🗑️ 删除');}
function tog(el){el.classList.toggle('open')}

function render(d){
  const app=document.getElementById('app');
  const allT=d.phases.flatMap(p=>p.tasks);
  const doneC=allT.filter(t=>t.done).length,totalC=allT.length;
  const pct=totalC?Math.round(doneC/totalC*100):0;
  const curPhase=d.phases.find(p=>isCur(p))||d.phases[0];
  const otherPhases=d.phases.filter(p=>p!==curPhase);
  let h='';

  h+='<div class="head"><h1>🍞👑 面包猫公主作战面板</h1><div class="day">'+todayLabel()+'</div></div>';
  h+='<div class="anchors">';d.daily_anchors.forEach(a=>{h+='<span class="atag">'+a+'</span>';});h+='</div>';

  d.deadlines.forEach(dl=>{const days=daysTo(dl.date);if(days<-30)return;let c='cd-item',col='color:var(--sage)';if(days<0){c+=' passed';col='color:var(--text2)';}else if(days<=3){c+=' imm';col='color:var(--coral)';}else if(days<=14){c+=' soon';col='color:var(--honey)';}h+='<div class="'+c+'"><span class="cd-e">'+dl.emoji+'</span><span class="cd-l">'+dl.label+(dl.note?'<br><span class="cd-n">'+dl.note+'</span>':'')+'</span><span class="cd-d" style="'+col+'">'+(days<0?'已过':days+'天')+'</span></div>';});

  h+='<div class="daily"><div class="daily-head"><h2>☀️ 今日任务</h2><span class="hint">每日自动刷新</span></div>';
  if(d.daily_tasks&&d.daily_tasks.tasks){d.daily_tasks.tasks.forEach(t=>{const on=t.done?'on':'';h+='<div class="dtask '+on+'"><div class="dchk '+on+'" onclick="event.stopPropagation();toggleDaily(\''+t.id+'\')"></div><span class="dl">'+t.text+'</span>';if(!t.recurring)h+='<span class="ddel" onclick="event.stopPropagation();delTask(\''+t.id+'\')">×</span>';h+='</div>';});}
  if(getToken())h+='<div class="add-row"><input id="newtask" class="add-inp" placeholder="添加任务…" onkeydown="if(event.key===\'Enter\')addTask()"><button class="add-btn" onclick="addTask()">+</button></div>';
  h+='<div class="saving" id="ss"></div></div>';

  h+='<div class="pstrip"><div class="pbar-o"><div class="pbar-i" style="width:'+pct+'%"></div></div><span class="plabel">'+doneC+'/'+totalC+'</span></div>';

  const cpD=curPhase.tasks.filter(t=>t.done).length,cpT=curPhase.tasks.length;
  h+='<div class="active-phase"><div class="ap-head"><span class="t">'+curPhase.title+'</span><span class="now">进行中</span></div><div class="pmini">'+cpD+'/'+cpT+' 完成</div>';
  curPhase.tasks.forEach(t=>{const tc=t.done?'task done':(t.urgent?'task urg':'task');h+='<div class="'+tc+'"><div class="chk"></div><span class="lbl">'+t.text+'</span></div>';});
  h+='</div>';

  h+='<div class="dir" onclick="tog(this)"><div class="dir-toggle"><span class="t">📂 其他目标与追踪</span><span class="arr">▶</span></div><div class="dir-body">';
  otherPhases.forEach(p=>{const pD=p.tasks.filter(t=>t.done).length,pT=p.tasks.length;h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">'+p.title+'</span><span class="sub">'+pD+'/'+pT+'</span><span class="arr">▶</span></div><div class="sec-b">';p.tasks.forEach(t=>{const tc=t.done?'task done':(t.urgent?'task urg':'task');h+='<div class="'+tc+'"><div class="chk"></div><span class="lbl">'+t.text+'</span></div>';});h+='</div></div>';});

  const k=d.language_tracker.korean;
  h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">🇰🇷 韩语</span><span class="sub">'+k.streak_days+'天🔥 '+k.vocab_count+'词</span><span class="arr">▶</span></div><div class="sec-b">';
  h+='<div class="trow"><span>目标</span><span class="v">'+k.target+'</span></div><div class="trow"><span>报名</span><span class="v" style="color:'+(k.registered?'var(--sage)':'var(--coral)')+';">'+(k.registered?'✅ 已报名':k.registration_window)+'</span></div><div class="trow"><span>每日</span><span class="v">'+k.daily_minutes_current+'分钟</span></div><div class="trow"><span>词汇</span><span class="v">'+k.vocab_count+'</span></div><div class="trow"><span>连续</span><span class="v">'+k.streak_days+'天🔥</span></div>';
  k.milestones.forEach(m=>{h+='<div class="ms '+(m.done?'done':'')+'"><div class="dot"></div><span>'+m.label+'</span></div>';});h+='</div></div>';

  const ie=d.language_tracker.ielts;
  h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">🇬🇧 雅思</span><span class="sub">'+(ie.baseline_score||'待测')+'</span><span class="arr">▶</span></div><div class="sec-b">';
  h+='<div class="trow"><span>目标</span><span class="v">'+ie.target+'</span></div><div class="trow"><span>基准</span><span class="v">'+(ie.baseline_score||'待测')+'</span></div><div class="trow"><span>考试</span><span class="v">'+(ie.exam_date||'待报名')+'</span></div>';
  ie.milestones.forEach(m=>{h+='<div class="ms '+(m.done?'done':'')+'"><div class="dot"></div><span>'+m.label+'</span></div>';});h+='</div></div>';

  h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">💼 职业</span><span class="sub">'+d.career.target_city+'</span><span class="arr">▶</span></div><div class="sec-b">';
  h+='<div class="trow"><span>Dream</span><span class="v" style="font-size:11px">'+d.career.dream_job+'</span></div>';
  d.career.portfolio_tasks.forEach(t=>{h+='<div class="task '+(t.done?'done':'')+'"><div class="chk"></div><span class="lbl">'+t.text+'</span></div>';});h+='</div></div>';

  const g=d.game_project;
  h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">🎮 '+g.name+'</span><span class="sub">'+g.status+'</span><span class="arr">▶</span></div><div class="sec-b"><div class="sgrid"><div class="sitem"><div class="sl">地图</div><div class="sv">'+g.spec.maps+'</div></div><div class="sitem"><div class="sl">天数</div><div class="sv">'+g.spec.days+'</div></div><div class="sitem"><div class="sl">行动点</div><div class="sv">'+g.spec.action_points+'</div></div><div class="sitem"><div class="sl">NPC</div><div class="sv">'+g.spec.npcs+'</div></div><div class="sitem"><div class="sl">事件</div><div class="sv">'+g.spec.events+'</div></div><div class="sitem"><div class="sl">结局</div><div class="sv">'+g.spec.endings+'</div></div></div></div></div>';

  h+='<div class="sec" onclick="event.stopPropagation();tog(this)"><div class="sec-h"><span class="t">🅿️ 灵感停车场</span><span class="sub">'+d.inspiration_parking.length+'条</span><span class="arr">▶</span></div><div class="sec-b">';
  if(!d.inspiration_parking.length)h+='<div class="park-empty">扔给小苏一句话就行喵</div>';
  else d.inspiration_parking.forEach(i=>{h+='<div class="park">'+i.text+' <span style="color:var(--text2);font-size:10px">'+(i.date||'')+'</span></div>';});
  h+='</div></div></div></div>';

  h+='<div class="footer">🍞 小苏 × 可颂喵公主<br>'+d.meta.last_updated+' · '+d.meta.updated_by+'</div>';
  if(!getToken())h+='<div class="setup"><p>首次使用：输入令牌启用打勾功能</p><input id="tk" type="password" placeholder="粘贴 GitHub token…"><br><button onclick="setToken(document.getElementById(\'tk\').value);location.reload();">启用</button></div>';
  app.innerHTML=h;app.className='';
}
async function init(){try{await readData();const nr=resetDaily();render(DATA);if(nr&&getToken())await writeData('🌅 新的一天');}catch(e){document.getElementById('app').innerHTML='<div style="text-align:center;padding:40px;color:var(--coral)">加载失败喵😿<br><small>刷新试试</small></div>';}}
init();
</script>
</body>
</html>
