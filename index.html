<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍞 面包猫公主作战面板</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --pink: #f778ba;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .header {
    text-align: center;
    padding: 24px 0 20px;
  }
  .header h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text2);
  }
  .meta-bar {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
    padding: 8px 12px;
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .progress-ring {
    text-align: center;
    padding: 20px 0;
  }
  .progress-ring .big-num {
    font-size: 48px;
    font-weight: 700;
    color: var(--green);
  }
  .progress-ring .big-label {
    font-size: 13px;
    color: var(--text2);
  }
  .progress-bar-outer {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin: 8px 0 20px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 4px;
    transition: width 0.5s;
  }
  .phase {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .phase.active { border-color: var(--green); }
  .phase.urgent { border-color: var(--red); }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .phase-header .emoji { font-size: 20px; }
  .phase-header .title { font-size: 15px; font-weight: 600; flex: 1; }
  .phase-header .date {
    font-size: 11px;
    color: var(--text2);
    background: rgba(255,255,255,0.06);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .phase-progress {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 14px;
  }
  .task .check {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .task.done .check {
    background: var(--green);
    border-color: var(--green);
  }
  .task.done .check::after { content: "✓"; color: #fff; font-weight: 700; }
  .task.done .label { text-decoration: line-through; color: var(--text2); }
  .task.urgent .label { color: var(--red); font-weight: 500; }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tracker-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }
  .tracker-row .val {
    font-weight: 600;
    color: var(--accent);
  }
  .milestone {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 13px;
  }
  .milestone .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .milestone.done .dot { background: var(--green); }
  .milestone.done { color: var(--text2); text-decoration: line-through; }

  .spec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .spec-item {
    background: rgba(255,255,255,0.04);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  .spec-item .spec-label { color: var(--text2); font-size: 11px; }
  .spec-item .spec-val { font-weight: 600; }

  .parking-item {
    padding: 8px 12px;
    background: rgba(188,140,255,0.08);
    border-left: 3px solid var(--purple);
    border-radius: 0 8px 8px 0;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .parking-empty {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
  }

  .anchors {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .anchor-tag {
    font-size: 12px;
    background: rgba(63,185,80,0.1);
    color: var(--green);
    padding: 4px 10px;
    border-radius: 12px;
  }

  .footer {
    text-align: center;
    padding: 20px 0;
    font-size: 12px;
    color: var(--text2);
  }
  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--red);
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    font-size: 16px;
    color: var(--text2);
  }
</style>
</head>
<body>

<div id="app" class="loading">🍞 面包烤制中...</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/mianbaomaogongzhu/-/main/data.json';

async function load() {
  const app = document.getElementById('app');
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    render(d);
  } catch(e) {
    app.innerHTML = '<div class="error-msg">加载失败喵😿<br><small>请检查网络或稍后刷新</small></div>';
  }
}

function render(d) {
  const app = document.getElementById('app');
  const allTasks = d.phases.flatMap(p => p.tasks);
  const doneCount = allTasks.filter(t => t.done).length;
  const totalCount = allTasks.length;
  const pct = totalCount ? Math.round(doneCount / totalCount * 100) : 0;

  let html = '';

  // Header
  html += `<div class="header">
    <h1>🍞👑 面包猫公主作战面板</h1>
    <div class="subtitle">${d.meta.current_period}</div>
  </div>`;

  // Meta bar
  html += `<div class="meta-bar">
    <span>更新：${d.meta.last_updated}</span>
    <span>by ${d.meta.updated_by}</span>
  </div>`;

  // Progress ring
  html += `<div class="progress-ring">
    <div class="big-num">${pct}%</div>
    <div class="big-label">${doneCount} / ${totalCount} 任务完成</div>
  </div>
  <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>`;

  // Phases
  d.phases.forEach(p => {
    const pDone = p.tasks.filter(t => t.done).length;
    const pTotal = p.tasks.length;
    const cls = p.status === 'active' ? 'phase active' : 'phase';
    html += `<div class="${cls}">
      <div class="phase-header">
        <span class="emoji">${p.emoji}</span>
        <span class="title">${p.title}</span>
        <span class="date">${p.date_range}</span>
      </div>
      <div class="phase-progress">${pDone}/${pTotal} 完成</div>`;
    p.tasks.forEach(t => {
      const tcls = t.done ? 'task done' : (t.urgent ? 'task urgent' : 'task');
      html += `<div class="${tcls}"><div class="check"></div><span class="label">${t.text}</span></div>`;
    });
    html += '</div>';
  });

  // Korean tracker
  const k = d.language_tracker.korean;
  html += `<div class="section">
    <div class="section-title">🇰🇷 韩语 TOPIK I</div>
    <div class="tracker-row"><span>目标</span><span class="val">${k.target}</span></div>
    <div class="tracker-row"><span>报名窗口</span><span class="val" style="color:${k.registered?'var(--green)':'var(--red)'};">${k.registered?'✅ 已报名':k.registration_window}</span></div>
    <div class="tracker-row"><span>每日时长</span><span class="val">${k.daily_minutes_current}分钟</span></div>
    <div class="tracker-row"><span>词汇量</span><span class="val">${k.vocab_count}</span></div>
    <div class="tracker-row"><span>连续天数</span><span class="val">${k.streak_days}天 🔥</span></div>
    <div style="margin-top:8px;">`;
  k.milestones.forEach(m => {
    html += `<div class="milestone ${m.done?'done':''}"><div class="dot"></div><span>${m.label}</span></div>`;
  });
  html += '</div></div>';

  // IELTS tracker
  const ie = d.language_tracker.ielts;
  html += `<div class="section">
    <div class="section-title">🇬🇧 雅思 IELTS</div>
    <div class="tracker-row"><span>目标</span><span class="val">${ie.target}</span></div>
    <div class="tracker-row"><span>基准分</span><span class="val">${ie.baseline_score || '待测'}</span></div>
    <div class="tracker-row"><span>考试日期</span><span class="val">${ie.exam_date || '待报名'}</span></div>
    <div style="margin-top:8px;">`;
  ie.milestones.forEach(m => {
    html += `<div class="milestone ${m.done?'done':''}"><div class="dot"></div><span>${m.label}</span></div>`;
  });
  html += '</div></div>';

  // Career
  html += `<div class="section">
    <div class="section-title">💼 职业目标</div>
    <div class="tracker-row"><span>Dream Job</span><span class="val" style="font-size:12px;">${d.career.dream_job}</span></div>
    <div class="tracker-row"><span>目标城市</span><span class="val">${d.career.target_city}</span></div>
    <div style="margin-top:8px;font-size:13px;font-weight:500;margin-bottom:4px;">作品集进度</div>`;
  d.career.portfolio_tasks.forEach(t => {
    const tcls = t.done ? 'task done' : 'task';
    html += `<div class="${tcls}"><div class="check"></div><span class="label">${t.text}</span></div>`;
  });
  html += '</div>';

  // Game project
  const g = d.game_project;
  html += `<div class="section">
    <div class="section-title">🎮 ${g.name}</div>
    <div class="tracker-row"><span>状态</span><span class="val">${g.status}</span></div>
    <div class="spec-grid" style="margin-top:8px;">
      <div class="spec-item"><div class="spec-label">地图</div><div class="spec-val">${g.spec.maps}</div></div>
      <div class="spec-item"><div class="spec-label">天数</div><div class="spec-val">${g.spec.days}</div></div>
      <div class="spec-item"><div class="spec-label">行动点</div><div class="spec-val">${g.spec.action_points}</div></div>
      <div class="spec-item"><div class="spec-label">NPC</div><div class="spec-val">${g.spec.npcs}</div></div>
      <div class="spec-item"><div class="spec-label">事件</div><div class="spec-val">${g.spec.events}</div></div>
      <div class="spec-item"><div class="spec-label">结局</div><div class="spec-val">${g.spec.endings}</div></div>
    </div>
  </div>`;

  // Inspiration parking
  html += `<div class="section">
    <div class="section-title">🅿️ 灵感停车场</div>`;
  if (d.inspiration_parking.length === 0) {
    html += '<div class="parking-empty">还没有灵感…9月前只存一句话喵</div>';
  } else {
    d.inspiration_parking.forEach(item => {
      html += `<div class="parking-item">${item.text} <span style="color:var(--text2);font-size:11px;">${item.date||''}</span></div>`;
    });
  }
  html += '</div>';

  // Daily anchors
  html += `<div class="section">
    <div class="section-title">⚓ 每日锚点</div>
    <div class="anchors">`;
  d.daily_anchors.forEach(a => {
    html += `<span class="anchor-tag">${a}</span>`;
  });
  html += '</div></div>';

  // Footer
  html += `<div class="footer">🍞 小苏 × 可颂喵公主 · 面包国出品<br>数据由小苏通过GitHub API更新</div>`;

  app.innerHTML = html;
  app.className = '';
}

load();
</script>
</body>
</html>
